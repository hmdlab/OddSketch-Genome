services:
  pair-task:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINDASH_TAG: ${BINDASH_TAG:-v2.6}
    image: genome-oddsketch:latest
    working_dir: /workspace
    environment:
      ODDSKETCH_BIN: /workspace/src/oddsketch
    command:
      - uv
      - run
      - python
      - experiments/pair_task/scripts/batch_project_runner.py
      - --config
      - experiments/pair_task/config.json
    volumes:
      - ./experiments/pair_task:/workspace/experiments/pair_task
      - ./docker-data:/data

  pair-task-sketchsize:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINDASH_TAG: ${BINDASH_TAG:-v2.6}
    image: genome-oddsketch:latest
    working_dir: /workspace
    environment:
      ODDSKETCH_BIN: /workspace/src/oddsketch
    command:
      - uv
      - run
      - python
      - experiments/pair_task/scripts/batch_project_runner.py
      - --config-dir
      - configs_sketchsize
      - --jobs
      - ${PAIR_TASK_JOBS:-1}
    volumes:
      - ./experiments/pair_task:/workspace/experiments/pair_task
      - ./docker-data:/data

  pair-task-bbits:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINDASH_TAG: ${BINDASH_TAG:-v2.6}
    image: genome-oddsketch:latest
    working_dir: /workspace
    environment:
      ODDSKETCH_BIN: /workspace/src/oddsketch
    command:
      - uv
      - run
      - python
      - experiments/pair_task/scripts/batch_project_runner.py
      - --config-dir
      - configs_bbits
      - --jobs
      - ${PAIR_TASK_JOBS:-1}
    volumes:
      - ./experiments/pair_task:/workspace/experiments/pair_task
      - ./docker-data:/data

  oddsketch:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINDASH_TAG: ${BINDASH_TAG:-v2.6}
    image: genome-oddsketch:latest
    working_dir: /data
    entrypoint: ["oddsketch"]
    command: ["--help"]
    stdin_open: true
    tty: true
    volumes:
      - ./docker-data:/data
